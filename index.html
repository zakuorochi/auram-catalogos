<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURAM | Demo Inversores</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }
        #splash { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 2rem; letter-spacing: 10px; background: #000; z-index: 1000; transition: opacity 1s; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; inset: 0; z-index: 1; filter: brightness(0.8); }
        .ui-panel { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 100; }
        .btn-auram { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #00d1ff; background: rgba(0,209,255,0.1); backdrop-filter: blur(5px); color: #fff; font-size: 2rem; cursor: pointer; box-shadow: 0 0 30px rgba(0,209,255,0.3); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 30px; text-align: center; }
        .ad-space { color: #666; font-size: 0.7rem; margin-top: 20px; border: 1px solid #333; padding: 5px; width: 100%; }
        .btn-cat { background: #00d1ff; color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,209,255,0.4); }
    </style>
</head>
<body>

    <div id="splash">AURAM</div>
    <video id="webcam" autoplay playsinline muted></video>

    <div class="ui-panel">
        <button class="btn-auram" onclick="mostrarMenu()">✨</button>
        <p style="font-size: 0.8rem; color: #00d1ff; margin-top: 10px; letter-spacing: 2px;">MODO DEMO GRATUITO</p>
    </div>

    <div id="modal-menu" class="overlay">
        <h2 style="font-weight: 200;">¿Cuál es tu destino hoy?</h2>
        <button onclick="procesar('Boda')" style="margin:10px; padding:20px; width:260px; border-radius:15px; border:1px solid #00d1ff; background:none; color:#fff; font-weight:bold;">EVENTO ELEGANTE</button>
        <button onclick="procesar('Casual')" style="margin:10px; padding:20px; width:260px; border-radius:15px; border:1px solid #fff; background:none; color:#fff; font-weight:bold;">ESTILO DIARIO</button>
        <div class="ad-space">PUBLICIDAD: Espacio disponible para marcas locales</div>
        <p onclick="cerrarModales()" style="margin-top:20px; color:#444; cursor:pointer;">Cerrar</p>
    </div>

    <div id="modal-res" class="overlay" style="justify-content: flex-start; padding-top: 50px; overflow-y: auto;">
        <div id="res-texto" style="text-align: left; line-height: 1.8; font-size: 1.1rem; max-width: 500px;"></div>
        <button onclick="location.reload()" style="margin-top:30px; background:#222; border:none; color:#fff; padding:15px; border-radius:10px;">OTRA CONSULTA</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        
        // Inicializar cámara
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => {
                video.srcObject = s;
                video.onloadedmetadata = () => {
                    document.getElementById('splash').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 1000);
                };
            });

        function mostrarMenu() { document.getElementById('modal-menu').style.display = 'flex'; }
        function cerrarModales() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }

        async function procesar(ocasion) {
            cerrarModales();
            const modalRes = document.getElementById('modal-res');
            const resTexto = document.getElementById('res-texto');
            modalRes.style.display = 'flex';
            resTexto.innerHTML = "Analizando tu aura y consultando catálogos de temporada...";

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

            // 🛡️ SEGURIDAD: API KEY PARTIDA
            const k1 = "AIzaSy"; 
            const k2 = "Axr1gXZPWU8aSanErff2LiApGitDwQBUQ"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k1}${k2}`;

            const prompt = `Eres AURAM, una IA asesora de moda extremadamente empática y elegante. 
            El usuario va a una ${ocasion}. Analiza su imagen y recomienda una prenda de nuestros catálogos. 
            Tu tono debe ser profesional pero cercano. 
            IMPORTANTE: Debes indicar el número de página como "Página: [Número]" y usar la palabra FOTO al final.`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }] })
                });
                const data = await response.json();
                let output = data.candidates[0].content.parts[0].text;

                // Lógica de enlace a catálogo (Paso 2)
                const pMatch = output.match(/Página:?\s*(\d+)/i);
                if (pMatch) {
                    const imgUrl = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/mujer/pagina_${pMatch[1]}.jpg`;
                    output = output.replace(/FOTO/g, `<br><a href="${imgUrl}" target="_blank" class="btn-cat">📸 VER PRENDA RECOMENDADA</a>`);
                }
                resTexto.innerHTML = output;
            } catch (e) {
                resTexto.innerHTML = "Error de conexión. Asegúrate de tener una API Key activa y configurada.";
            }
        }
    </script>
</body>
</html>

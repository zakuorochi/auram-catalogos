<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAM | IA-Blocks</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        .btn-magic { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; background: none; font-size: 2rem; cursor: pointer; z-index: 10; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 20; padding: 20px; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <button class="btn-magic" onclick="analizar()">✨</button>

    <div id="loading" class="overlay">Un momento, AURAM está pensando...</div>
    <div id="result" class="overlay" onclick="this.style.display='none'">
        <div id="res-text" style="text-align:left; max-width:400px;"></div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        
        // Iniciamos cámara de forma simple
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => video.srcObject = s);

        async function analizar() {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            // 1. Capturamos la foto
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg').split(',')[1];

            // 🚨 EL CAMBIO RADICAL: Petición directa REST sin librerías
            // Reemplaza TU_API_KEY_AQUI
            const API_KEY = "AIzaSyC7qYCX6ZkWt27lBucufiBasxTLEhP16wQ; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: "Eres AURAM, un asesor de moda empático. Recomienda una prenda para una salida casual basándote en la imagen. Sé breve." },
                        { inlineData: { mimeType: "image/jpeg", data: base64 } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                // Mostramos el resultado
                loading.style.display = 'none';
                const resDiv = document.getElementById('result');
                resDiv.style.display = 'flex';
                document.getElementById('res-text').innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                loading.style.display = 'none';
                alert("Error de conexión: " + e.message);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURAM | Elevate Your Aura</title>
<style>
    /* ... tus estilos generales ... */
    
    /* PANTALLA DE CARGA (SPLASH) - NUEVO ESTILO CON LOGO INDEPENDIENTE */
    #splash { 
        position: fixed; inset: 0; 
        display: flex; flex-direction: column; justify-content: center; align-items: center; 
        background: #000; z-index: 1000; 
        transition: opacity 1.2s ease, transform 1s ease; 
    }
    
    /* Contenedor principal para logo y texto */
    .brand-container { text-align: center; display: flex; flex-direction: column; align-items: center;}

    /* Contenedor del Logo Estilizado (réplica de la referencia en blanco) */
    .logo-a-icon { 
        width: 100px; /* Tamaño del icono */
        height: 100px; /* Tamaño del icono */
        margin-bottom: 30px; /* Espacio entre el icono y la palabra */
        background-color: transparent;
        /* Usamos un degradado para replicar la forma de la A de la referencia en blanco */
        background-image: 
            /* Barra izquierda oblicua */
            linear-gradient(to right, #fff 0%, #fff 35%, transparent 35%, transparent 100%),
            /* Barra derecha oblicua */
            linear-gradient(to left, #fff 0%, #fff 35%, transparent 35%, transparent 100%),
            /* Barra central horizontal */
            linear-gradient(to bottom, transparent 0%, transparent 45%, #fff 45%, #fff 55%, transparent 55%, transparent 100%);
        background-size: 
            65% 100%, /* Barra izquierda */
            65% 100%, /* Barra derecha */
            100% 65%; /* Barra central */
        background-position: 
            0% 0%, /* Barra izquierda */
            100% 0%, /* Barra derecha */
            0% 0%; /* Barra central */
        background-repeat: no-repeat;
        /* Efecto de máscara para crear la forma de la referencia */
        -webkit-mask-image: linear-gradient(to bottom, #fff 0%, #fff 100%);
        mask-image: linear-gradient(to bottom, #fff 0%, #fff 100%);
        -webkit-mask-size: 100% 100%;
        mask-size: 100% 100%;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        
    }

    /* La palabra completa en blanco */
    .brand-name { 
        font-size: 2.5rem; 
        letter-spacing: 15px; /* Menos espacio para que se lea mejor como palabra */
        font-weight: 300; 
        color: #fff;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    }

    .aura-msg { 
        margin-top: 50px; 
        font-size: 0.8rem; 
        letter-spacing: 4px; 
        color: #888; 
        text-transform: uppercase; 
        animation: pulse 2s infinite; 
    }
    
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ... resto de estilos de video, modal y botones ... */
</style>

<div id="splash">
    <div class="brand-container">
        <div class="logo-a-icon"></div>
        <div class="brand-name">AURAM</div>
    </div>
    <div class="aura-msg">Prepárate para elevar tu aura</div>
</div>

    <video id="webcam" autoplay playsinline muted></video>
    
    <div class="ui">
        <button class="btn-magic" onclick="abrirMenu()">✨</button>
    </div>

    <div id="modal-opt" class="overlay">
        <h2 style="font-weight:200; letter-spacing: 2px; margin-bottom: 10px;">¿CUÁL ES TU DESTINO?</h2>
        <div class="grid-opts">
            <button class="btn-opt" onclick="ejecutarIA('Boda')">Boda/Gala</button>
            <button class="btn-opt" onclick="ejecutarIA('Cita')">Una Cita</button>
            <button class="btn-opt" onclick="ejecutarIA('Trabajo')">Trabajo</button>
            <button class="btn-opt" onclick="ejecutarIA('Amigos')">Amigos</button>
            <button class="btn-opt" onclick="ejecutarIA('Familia')">Familia</button>
            <button class="btn-opt" onclick="ejecutarIA('Casual')">Casual</button>
        </div>
        <p onclick="cerrarModales()" style="margin-top:30px; color:#666; cursor:pointer; font-size: 0.8rem; letter-spacing: 2px;">CANCELAR</p>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p style="letter-spacing:3px; font-size: 0.8rem;">AURAM ANALIZANDO...</p>
    </div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; padding-top: 60px;">
        <div id="res-body"></div>
        <button onclick="location.reload()" style="margin-top:40px; background:#333; color:#fff; border:none; padding:15px 30px; border-radius:12px; font-weight: bold; cursor:pointer;">NUEVO ANÁLISIS</button>
    </div>

  <script>
        const video = document.getElementById('webcam');

        // Seguridad de Audio: Detener al salir
        window.addEventListener('beforeunload', () => { window.speechSynthesis.cancel(); });
        window.addEventListener('blur', () => { window.speechSynthesis.cancel(); });

        function hablar(texto) {
            window.speechSynthesis.cancel();
            // Limpiamos etiquetas antes de hablar
            const limpio = texto.replace(/Género:?\s*(hombre|mujer)/gi, "")
                                .replace(/Página:?\s*\d+/gi, "")
                                .replace(/FOTO/gi, "")
                                .replace(/<[^>]*>/g, "");
            const m = new SpeechSynthesisUtterance(limpio);
            m.lang = 'es-ES'; m.rate = 0.95;
            window.speechSynthesis.speak(m);
        }

        // Carga automática (3 seg)
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                iniciarCamara();
                setTimeout(() => { splash.style.display = 'none'; }, 1000);
            }, 3000);
        };

        async function iniciarCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
            } catch (err) { console.log("Cámara no disponible."); }
        }

        function abrirMenu() { 
            window.speechSynthesis.cancel();
            document.getElementById('modal-opt').style.display = 'flex'; 
        }

        function cerrarModales() { 
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); 
            window.speechSynthesis.cancel(); 
        }

        async function ejecutarIA(ocasion) {
            document.getElementById('modal-opt').style.display = 'none';
            document.getElementById('modal-loading').style.display = 'flex';

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            try {
                const response = await fetch('/api/analizar', {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Img, ocasion: ocasion })
                });

                const data = await response.json();
                if (data.isError) throw new Error(data.detalle);

                let textoIA = data.candidates[0].content.parts[0].text;
                
                // 1. Hablar el texto original (la función hablar lo limpia internamente)
                hablar(textoIA);

                // 2. DETECTAR GÉNERO Y PÁGINA (Lógica de ceros: 0001)
                const generoMatch = textoIA.match(/Género:?\s*(hombre|mujer)/i);
                const pagMatch = textoIA.match(/Página:?\s*(\d+)/i);

                if (generoMatch && pagMatch) {
                    const gen = generoMatch[1].toLowerCase().trim(); 
                    const nOriginal = pagMatch[1].trim();
                    
                    // Convertir "1" en "0001"
                    const nConCeros = nOriginal.padStart(4, '0'); 
                    
                    // Nombre exacto: hombre_page-0001.jpg
                    const nombreArchivo = `${gen}_page-${nConCeros}.jpg`;
                    const urlFoto = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/${gen}/${nombreArchivo}`;
                    
                    textoIA = textoIA.replace(/FOTO/g, `<br><a href="${urlFoto}" target="_blank" class="btn-foto">📸 VER EN CATÁLOGO</a>`);
                }

                // 3. Limpiar etiquetas técnicas para la pantalla
                textoIA = textoIA.replace(/Género:?\s*(hombre|mujer)/gi, "")
                                 .replace(/Página:?\s*\d+/gi, "");

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = textoIA;

            } catch (err) {
                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = `<p style="color:#ff4444;">${err.message}</p>`;
            }
        }
    </script>
</body>
</html>

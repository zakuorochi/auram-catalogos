<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAM | Asesoría IA</title>
    
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>

    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100%; overflow: hidden; }
        #splash { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; letter-spacing: 10px; background: #000; z-index: 100; transition: 0.8s; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        .btn-magic { width: 75px; height: 75px; border-radius: 50%; border: none; background: #fff; font-size: 2rem; box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; z-index: 50; text-align: center; }
        .loader { border: 4px solid #222; border-top: 4px solid #00d1ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #res-body { text-align: left; max-width: 500px; line-height: 1.6; font-size: 1.1rem; }
        .btn-foto { background: #00d1ff; color: #000; padding: 12px 25px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="splash">AURAM</div>

    <video id="webcam" autoplay playsinline></video>
    
    <div class="ui">
        <button class="btn-magic" onclick="document.getElementById('modal-options').style.display='flex'">✨</button>
    </div>

    <div id="modal-options" class="overlay">
        <h2>¿Cuál es tu destino?</h2>
        <button onclick="analizar('Boda')" style="margin:10px; padding:15px; width:200px; border-radius:10px;">Boda</button>
        <button onclick="analizar('Cita')" style="margin:10px; padding:15px; width:200px; border-radius:10px;">Cita</button>
        <button onclick="analizar('Fiesta')" style="margin:10px; padding:15px; width:200px; border-radius:10px;">Fiesta</button>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p>CONECTANDO CON EL UNIVERSO...</p>
    </div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; padding-top: 40px; overflow-y: auto;">
        <div id="res-body"></div>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid #444; color:#888;">Cerrar</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // 🚨 CONFIGURACIÓN
        const API_KEY = "AIzaSyD0zxzRHftqgAsKcxSAxN1x5Lc7SgP_OsY"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-2.0-flash" });

        const video = document.getElementById('webcam');

        // Iniciar cámara y quitar splash
        window.onload = () => {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(s => { 
                    video.srcObject = s;
                    setTimeout(() => document.getElementById('splash').style.opacity = '0', 1000);
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 2000);
                })
                .catch(e => alert("Permite el acceso a la cámara"));
        };

        window.analizar = async (ocasion) => {
            document.getElementById('modal-options').style.display = 'none';
            document.getElementById('modal-loading').style.display = 'flex';

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const base64 = canvas.toDataURL('image/jpeg').split(',')[1];

                const prompt = `Actúa como asesor de moda empático. El usuario va a una ${ocasion}. 
                Analiza su imagen (silenciosamente: color de piel, complexión) y recomienda una prenda del catálogo. 
                Respuesta corta y cálida. Incluye "Página: [Número]" y la palabra "FOTO".`;

                // LLAMADA A LA API
                const result = await model.generateContent([
                    { inlineData: { data: base64, mimeType: "image/jpeg" } },
                    prompt
                ]);

                let texto = result.response.text();
                
                // Lógica de Foto
                const pMatch = texto.match(/Página:?\s*(\d+)/i);
                if (pMatch) {
                    const n = pMatch[1];
                    const url = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/mujer/pagina_${n}.jpg`;
                    texto = texto.replace(/FOTO/g, `<br><a href="${url}" target="_blank" class="btn-foto">📸 VER FOTO</a>`);
                }

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = texto;

            } catch (error) {
                document.getElementById('modal-loading').style.display = 'none';
                // Mostramos el error real en pantalla para saber qué pasa
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = "ERROR TÉCNICO: " + error.message;
            }
        };
    </script>
</body>
</html>

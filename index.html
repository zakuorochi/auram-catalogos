<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURAM | IA-Blocks</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; z-index: 1; }
        .ui { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
        .btn-magic { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; background: rgba(255,255,255,0.1); font-size: 2.5rem; color: #fff; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; padding: 25px; text-align: center; }
        .btn-opt { margin: 10px; padding: 20px; width: 250px; border-radius: 15px; border: 1px solid #00d1ff; background: #111; color: #fff; font-size: 1.1rem; }
        .loader { border: 4px solid #222; border-top: 4px solid #00d1ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <div class="ui"><button class="btn-magic" onclick="document.getElementById('modal-opt').style.display='flex'">✨</button></div>

    <div id="modal-opt" class="overlay">
        <button class="btn-opt" onclick="ejecutar('Boda')">Boda</button>
        <button class="btn-opt" onclick="ejecutar('Casual')">Casual</button>
    </div>

    <div id="modal-loading" class="overlay"><div class="loader"></div><p>CONECTANDO CON GEMINI 2.0...</p></div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; padding-top: 60px;">
        <div id="res-body" style="text-align: left; line-height: 1.6;"></div>
        <button onclick="location.reload()" style="margin-top:20px;">REINTENTAR</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // 🚨 CONFIGURACIÓN
        const API_KEY = "AIzaSyCR1Ec3n1xdxlGPEfdLiB3Q6KH0vCiYuZM"; // Asegúrate de que esta llave sea nueva
        const genAI = new GoogleGenerativeAI(API_KEY);
        
        // --- EL CAMBIO DEFINITIVO ---
        // Usamos Gemini 2.0 Flash, el modelo vigente.
        const model = genAI.getGenerativeModel({ model: "gemini-2.0-flash" });

        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

        window.ejecutar = async (ocasion) => {
            document.getElementById('modal-opt').style.display = 'none';
            document.getElementById('modal-loading').style.display = 'flex';

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const base64 = canvas.toDataURL('image/jpeg').split(',')[1];

                const result = await model.generateContent([
                    { inlineData: { data: base64, mimeType: "image/jpeg" } },
                    { text: `Asesor de moda. Ocasión: ${ocasion}. Recomienda una prenda, indica Página: [Número] y la palabra FOTO.` }
                ]);

                let texto = result.response.text();
                
                // Lógica de Foto dinámica
                const pMatch = texto.match(/Página:?\s*(\d+)/i);
                if (pMatch) {
                    const url = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/mujer/pagina_${pMatch[1]}.jpg`;
                    texto = texto.replace(/FOTO/g, `<br><a href="${url}" target="_blank" style="color:#00d1ff;">📸 VER FOTO</a>`);
                }

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = texto;

            } catch (err) {
                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = "ERROR: " + err.message + 
                "<br><br>Nota: Verifica que la API 'Generative Language' esté habilitada en Google Cloud para tu proyecto.";
            }
        };
    </script>
</body>
</html>

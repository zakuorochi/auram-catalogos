<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURAM | IA-Blocks</title>
    <style>
        /* MANTENEMOS TU ESTÉTICA MINIMALISTA */
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        #splash { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; letter-spacing: 12px; background: #000; z-index: 999; transition: 0.8s; pointer-events: none; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; inset: 0; z-index: 1; background: #000; }
        .ui { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
        .btn-magic { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); font-size: 2.5rem; color: #fff; box-shadow: 0 0 25px rgba(0,209,255,0.4); outline: none; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; padding: 25px; text-align: center; }
        .btn-opt { margin: 10px; padding: 20px; width: 100%; max-width: 280px; border-radius: 15px; border: 1px solid #00d1ff; background: #111; color: #fff; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .loader { border: 4px solid #222; border-top: 4px solid #00d1ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #res-body { text-align: left; max-width: 500px; line-height: 1.7; font-size: 1.1rem; overflow-y: auto; max-height: 60vh; color: #eee; }
        .btn-foto { background: #00d1ff; color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="splash">AURAM</div>

    <video id="webcam" autoplay playsinline muted></video>
    
    <div class="ui">
        <button class="btn-magic" onclick="abrirMenu()">✨</button>
    </div>

    <div id="modal-opt" class="overlay">
        <h2 style="font-weight:200; letter-spacing: 2px;">DESTINO</h2>
        <button class="btn-opt" onclick="ejecutarIA('Boda')">Boda / Gala</button>
        <button class="btn-opt" onclick="ejecutarIA('Casual')">Uso Diario</button>
        <p onclick="cerrarModales()" style="margin-top:20px; color:#666; cursor:pointer;">CANCELAR</p>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p style="letter-spacing:3px; font-size: 0.8rem;">AURAM ESTÁ ANALIZANDO...</p>
    </div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; padding-top: 60px;">
        <div id="res-body"></div>
        <button onclick="location.reload()" style="margin-top:40px; background:#333; color:#fff; border:none; padding:15px 30px; border-radius:12px; font-weight: bold; cursor:pointer;">NUEVO ANÁLISIS</button>
    </div>

    <script>
        const video = document.getElementById('webcam');

        // Función para iniciar cámara con compatibilidad total
        async function iniciarCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                // Cuando el video cargue, quitamos el splash negro
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('splash').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
                };
            } catch (err) {
                console.error("Error de cámara:", err);
                document.getElementById('splash').innerText = "ERROR DE CÁMARA";
            }
        }

        // Arrancamos cámara al cargar
        iniciarCamara();

        function abrirMenu() {
            document.getElementById('modal-opt').style.display = 'flex';
        }

        function cerrarModales() {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        }

        async function ejecutarIA(ocasion) {
            document.getElementById('modal-opt').style.display = 'none';
            document.getElementById('modal-loading').style.display = 'flex';

            // 1. Captura de imagen
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            // 🚨 CONFIGURACIÓN: Pon tu llave aquí (Partida para evitar el bloqueo de GitHub)
            const p1 = "AIzaSy"; 
            const p2 = "C7qYCX6ZkWt27lBucufiBasxTLEhP16wQ"; 
            const API_KEY = p1 + p2;

            // Usamos Fetch directo para evitar el error 404 de la librería
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: `Eres AURAM, asesor de moda empático para una salida de tipo ${ocasion}. Analiza la foto y recomienda una prenda de catálogo. Indica "Página: [Número]" y usa la palabra FOTO.` },
                        { inlineData: { mimeType: "image/jpeg", data: base64Img } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let textoIA = data.candidates[0].content.parts[0].text;
                
                // Lógica de Foto dinámica de tus catálogos en GitHub
                const pagMatch = textoIA.match(/Página:?\s*(\d+)/i);
                if (pagMatch) {
                    const n = pagMatch[1];
                    const urlFoto = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/mujer/pagina_${n}.jpg`;
                    textoIA = textoIA.replace(/FOTO/g, `<br><a href="${urlFoto}" target="_blank" class="btn-foto">📸 VER EN CATÁLOGO</a>`);
                }

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = textoIA;

            } catch (err) {
                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = `<p style="color:#ff4444;">Error: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>

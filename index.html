<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURAM | IA-Blocks</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100%; overflow: hidden; }
        #splash { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; letter-spacing: 12px; background: #000; z-index: 100; transition: 0.8s; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 10; }
        .btn-magic { width: 80px; height: 80px; border-radius: 50%; border: none; background: #fff; font-size: 2rem; box-shadow: 0 0 20px #fff; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 50; padding: 20px; text-align: center; }
        .loader { border: 4px solid #222; border-top: 4px solid #00d1ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #res-body { text-align: left; max-width: 500px; line-height: 1.6; font-size: 1.1rem; }
        .btn-foto { background: #00d1ff; color: #000; padding: 12px 25px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="splash">AURAM</div>
    <video id="webcam" autoplay playsinline></video>
    <div class="ui">
        <button class="btn-magic" onclick="document.getElementById('modal-opt').style.display='flex'">✨</button>
    </div>

    <div id="modal-opt" class="overlay">
        <h2>¿Cuál es tu destino?</h2>
        <button onclick="analizar('Boda')" style="margin:10px; padding:15px; width:200px;">Boda</button>
        <button onclick="analizar('Casual')" style="margin:10px; padding:15px; width:200px;">Casual</button>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p>AURAM está analizando tu estilo...</p>
    </div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; padding-top: 50px; overflow-y: auto;">
        <div id="res-body"></div>
        <button onclick="location.reload()" style="margin-top:20px; background:#333; color:#fff; border:none; padding:10px;">Cerrar</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyD0zxzRHftqgAsKcxSAxN1x5Lc7SgP_OsY; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        // Usamos la versión estable certificada
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });

        const video = document.getElementById('webcam');

        window.onload = () => {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(s => { 
                    video.srcObject = s;
                    setTimeout(() => { document.getElementById('splash').style.opacity='0'; setTimeout(()=>document.getElementById('splash').style.display='none', 800); }, 2000);
                });
        };

        window.analizar = async (ocasion) => {
            document.getElementById('modal-opt').style.display = 'none';
            document.getElementById('modal-loading').style.display = 'flex';

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const base64 = canvas.toDataURL('image/jpeg').split(',')[1];

                // Prompt optimizado
                const result = await model.generateContent([
                    { inlineData: { data: base64, mimeType: "image/jpeg" } },
                    `Eres AURAM, asesor de moda empático. Recomienda una prenda para ${ocasion}. 
                    Incluye "Página: [Número]" y la palabra "FOTO" en tu respuesta.`
                ]);

                let texto = result.response.text();
                const pMatch = texto.match(/Página:?\s*(\d+)/i);
                if (pMatch) {
                    const url = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/mujer/pagina_${pMatch[1]}.jpg`;
                    texto = texto.replace(/FOTO/g, `<br><a href="${url}" target="_blank" class="btn-foto">📸 VER FOTO</a>`);
                }

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = texto;

            } catch (err) {
                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = "ERROR: " + err.message;
            }
        };
    </script>
</body>
</html>

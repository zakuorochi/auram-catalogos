<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURAM | IA-Blocks</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; inset: 0; z-index: 1; background: #111; }
        .ui { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
        .btn-magic { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); font-size: 2rem; color: #fff; cursor: pointer; box-shadow: 0 0 20px rgba(0,209,255,0.4); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; padding: 25px; text-align: center; }
        .btn-opt { margin: 10px; padding: 18px; width: 250px; border-radius: 15px; border: 1px solid #00d1ff; background: #111; color: #fff; font-size: 1.1rem; font-weight: bold; }
        .loader { border: 4px solid #222; border-top: 4px solid #00d1ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #res-body { text-align: left; max-width: 500px; line-height: 1.6; font-size: 1.1rem; overflow-y: auto; max-height: 60vh; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    
    <div class="ui">
        <button class="btn-magic" onclick="document.getElementById('modal-opt').style.display='flex'">✨</button>
    </div>

    <div id="modal-opt" class="overlay">
        <h2 style="font-weight:200;">¿A DÓNDE VAS?</h2>
        <button class="btn-opt" onclick="ejecutarIA('Boda')">Boda / Gala</button>
        <button class="btn-opt" onclick="ejecutarIA('Casual')">Uso Diario</button>
        <p onclick="this.parentElement.style.display='none'" style="margin-top:20px; color:#666;">Cerrar</p>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p>AURAM ANALIZANDO...</p>
    </div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; padding-top: 60px;">
        <div id="res-body"></div>
        <button onclick="location.reload()" style="margin-top:30px; background:#333; color:#fff; border:none; padding:12px 25px; border-radius:10px;">NUEVO ANÁLISIS</button>
    </div>

    <script>
        const video = document.getElementById('webcam');

        // --- INICIO DE CÁMARA (BLINDADO) ---
        async function iniciarCamara() {
            const constraints = {
                video: { facingMode: "user" },
                audio: false
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                console.log("Cámara lista");
            } catch (err) {
                alert("Error de cámara: Asegúrate de estar en HTTPS y dar permisos.");
                console.error(err);
            }
        }

        iniciarCamara();

        // --- LÓGICA DE IA (PETICIÓN DIRECTA) ---
        async function ejecutarIA(ocasion) {
            document.getElementById('modal-opt').style.display = 'none';
            document.getElementById('modal-loading').style.display = 'flex';

            // 1. Capturar imagen
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            // 🚨 REEMPLAZA ESTO CON TU API KEY (Pártela para que GitHub no la vea)
            const p1 = "AIzaSy"; 
            const p2 = "AIzaSyC7qYCX6ZkWt27lBucufiBasxTLEhP16wQ"; 
            const API_KEY = p1 + p2;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: `Eres AURAM, asesor de moda empático. Recomienda una prenda para ${ocasion}. Indica Página: [Número] y la palabra FOTO.` },
                        { inlineData: { mimeType: "image/jpeg", data: base64Img } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                let textoIA = data.candidates[0].content.parts[0].text;
                
                // Lógica de Foto
                const pMatch = textoIA.match(/Página:?\s*(\d+)/i);
                if (pMatch) {
                    const urlFoto = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/mujer/pagina_${pMatch[1]}.jpg`;
                    textoIA = textoIA.replace(/FOTO/g, `<br><a href="${urlFoto}" target="_blank" style="color:#00d1ff; font-weight:bold;">📸 VER FOTO</a>`);
                }

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = textoIA;

            } catch (err) {
                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>

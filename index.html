<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURAM | Asistente de Estilo</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #splash { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 1000; transition: opacity 0.8s ease; text-align: center; }
        .logo-a-png { width: 120px; height: auto; filter: drop-shadow(0 0 15px rgba(0,209,255,0.3)); }
        .brand-name { font-size: 1.5rem; letter-spacing: 12px; margin-top: 15px; font-weight: 200; }
        .aura-msg { margin-top: 30px; font-size: 0.7rem; letter-spacing: 2px; color: #00d1ff; text-transform: uppercase; padding: 0 40px; line-height: 1.5; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; inset: 0; z-index: 1; }
        .ui { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .btn-magic { width: 75px; height: 75px; border-radius: 50%; border: none; background: linear-gradient(135deg, #00d1ff, #0072ff); font-size: 2rem; color: #fff; box-shadow: 0 0 25px rgba(0,209,255,0.4); display: flex; align-items: center; justify-content: center; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.97); display: none; flex-direction: column; align-items: center; z-index: 200; padding: 25px; padding-top: 60px; text-align: center; }
        .grid-opts { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 300px; margin-top: 20px; }
        .btn-opt { padding: 20px; border-radius: 18px; border: 1px solid #222; background: #111; color: #fff; font-size: 1rem; }
        #res-body { width: 100%; font-size: 1.05rem; line-height: 1.7; color: #ddd; overflow-y: auto; text-align: left; }
        .card-reco { margin-top: 25px; background: rgba(255,255,255,0.05); border: 1px solid #00d1ff; border-radius: 20px; padding: 15px; text-align: center; }
        .thumb-img { width: 100%; max-width: 220px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .loader { border: 3px solid #111; border-top: 3px solid #00d1ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-reload { margin-top: 25px; background: #fff; color: #000; padding: 15px 40px; border-radius: 30px; font-weight: bold; border: none; }
        #loading-msg { color: #00d1ff; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; padding: 0 20px; margin-top: 10px; min-height: 2em; }
    </style>
</head>
<body onclick="iniciarApp()">

    <div id="splash">
        <img src="logo-auram.png" class="logo-a-png">
        <div class="brand-name">AURAM</div>
        <div class="aura-msg">Asistente de Estilo IA<br>Toca para comenzar</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    
    <div class="ui">
        <button class="btn-magic" onclick="event.stopPropagation(); abrirMenu()">✨</button>
    </div>

    <div id="modal-opt" class="overlay">
        <h3 style="font-weight:200; letter-spacing: 2px;">DESTINO</h3>
        <div class="grid-opts">
            <button class="btn-opt" onclick="ejecutarIA('Boda')">Boda o Gala</button>
            <button class="btn-opt" onclick="ejecutarIA('Cita')">Una Cita</button>
            <button class="btn-opt" onclick="ejecutarIA('Trabajo')">Trabajo</button>
            <button class="btn-opt" onclick="ejecutarIA('Casual')">Día Casual</button>
        </div>
        <p onclick="cerrarModales()" style="margin-top:30px; color:#444;">Cerrar</p>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p id="loading-msg"></p>
    </div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; overflow-y: auto;">
        <div id="res-body"></div>
        <button class="btn-reload" onclick="location.reload()">NUEVO ANÁLISIS</button>
        <div style="height: 40px;"></div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        let appIniciada = false;
        let audioActual = null;

        const frasesMotivacionales = [
            "Tu estilo es la firma de tu personalidad...",
            "Buscando prendas que eleven tu aura hoy.",
            "La elegancia es la única belleza que nunca se desvanece.",
            "Analizando texturas para tu presencia única.",
            "Tu confianza es tu mejor accesorio.",
            "Diseñando el look que hable por ti.",
            "Conectando con las tendencias que resaltan tu esencia.",
            "Tu próximo nivel de estilo te espera."
        ];

        function mostrarMensajeAleatorio() {
            const msgElemento = document.getElementById('loading-msg');
            const indice = Math.floor(Math.random() * frasesMotivacionales.length);
            msgElemento.innerText = frasesMotivacionales[indice];
        }

        function detenerAudio() {
            if (audioActual) { audioActual.pause(); audioActual.currentTime = 0; }
        }

        window.addEventListener('visibilitychange', () => { if (document.hidden) detenerAudio(); });

        function iniciarApp() {
            if(appIniciada) return;
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(stream => {
                video.srcObject = stream;
                appIniciada = true;
                setTimeout(() => splash.style.display = 'none', 800);
            });
        }

        function abrirMenu() { detenerAudio(); document.getElementById('modal-opt').style.display = 'flex'; }
        function cerrarModales() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

        async function ejecutarIA(ocasion) {
            cerrarModales();
            mostrarMensajeAleatorio();
            document.getElementById('modal-loading').style.display = 'flex';
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            try {
                const response = await fetch('/api/analizar', {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Img, ocasion: ocasion })
                });
                
              // ... (Dentro de ejecutarIA después del fetch) ...

                const data = await response.json();
                if (data.isError) throw new Error(data.detalle);

                // 1. REPRODUCIR ÚNICAMENTE EL AUDIO DE GOOGLE CLOUD
                if (data.audio) {
                    detenerAudio(); // Detiene cualquier audio anterior
                    audioActual = new Audio("data:audio/mp3;base64," + data.audio);
                    audioActual.play().catch(e => console.error("Error al reproducir audio:", e));
                }

                // IMPORTANTE: Asegúrate de NO tener ninguna línea que diga 'window.speechSynthesis.speak'
                // Si la ves, bórrala completamente.

// ... (El resto del código se mantiene igual) ...
                let respuestaFinal = data.texto;

                // 2. DETECTOR DE MINIATURA (Lógica del lunes restaurada)
                // Buscamos PAGINA_REF o IMG_REF para mayor compatibilidad
                const pagMatch = respuestaFinal.match(/(?:PAGINA_REF|IMG_REF):\s*(\d+)/i);
                const genMatch = respuestaFinal.match(/GENERO_REF:\s*(hombre|mujer)/i);

                if (pagMatch && genMatch) {
                    const gen = genMatch[1].toLowerCase().trim();
                    const numRaw = pagMatch[1].trim();
                    const numFormateado = numRaw.padStart(3, '0');
                    
                    // Ruta a GitHub con paréntesis (001).jpg
                    const urlFoto = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/${gen}/(${numFormateado}).jpg`;

                    const cardHTML = `
                        <div class="card-reco">
                            <p style="font-size: 0.6rem; color: #00d1ff; letter-spacing: 3px; margin-bottom: 10px;">VISTA PREVIA</p>
                            <img src="${urlFoto}" class="thumb-img" onerror="this.parentElement.style.display='none'">
                        </div>
                    `;
                    respuestaFinal = respuestaFinal.replace(/FOTO/g, cardHTML);
                }

                // Limpieza de etiquetas técnicas antes de mostrar
                respuestaFinal = respuestaFinal.replace(/GENERO_REF:.*|PAGINA_REF:.*|IMG_REF:.*|FOTO/gi, "");

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = respuestaFinal;

            } catch (err) {
                document.getElementById('modal-loading').style.display = 'none';
                alert("Error: " + err.message);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURAM | IA-Blocks</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; inset: 0; z-index: 1; background: #111; }
        
        /* Botón de inicio necesario para móviles */
        #btn-start-camera { position: fixed; inset: 0; z-index: 999; background: #000; color: #fff; border: none; font-size: 1.2rem; cursor: pointer; letter-spacing: 2px; }
        
        .ui { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 100; display: none; }
        .btn-magic { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; background: rgba(255,255,255,0.1); font-size: 2rem; color: #fff; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; padding: 25px; text-align: center; }
        .btn-opt { margin: 10px; padding: 18px; width: 250px; border-radius: 15px; border: 1px solid #00d1ff; background: #111; color: #fff; font-size: 1.1rem; }
        .loader { border: 4px solid #222; border-top: 4px solid #00d1ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <button id="btn-start-camera" onclick="activarTodo()">TOCA PARA ENCENDER AURAM</button>

    <video id="webcam" autoplay playsinline muted></video>
    
    <div id="ui-main" class="ui">
        <button class="btn-magic" onclick="document.getElementById('modal-opt').style.display='flex'">✨</button>
    </div>

    <div id="modal-opt" class="overlay">
        <h2>¿A DÓNDE VAS?</h2>
        <button class="btn-opt" onclick="analizarIA('Boda')">Boda / Gala</button>
        <button class="btn-opt" onclick="analizarIA('Casual')">Uso Diario</button>
        <p onclick="document.getElementById('modal-opt').style.display='none'" style="margin-top:20px; color:#666;">Cerrar</p>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p>AURAM ANALIZANDO...</p>
    </div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; padding-top: 60px; overflow-y: auto;">
        <div id="res-body" style="text-align: left; line-height: 1.6;"></div>
        <button onclick="location.reload()" style="margin-top:30px;">NUEVO ANÁLISIS</button>
    </div>

    <script>
        const video = document.getElementById('webcam');

        async function activarTodo() {
            try {
                // 1. Pedir cámara (esto necesita el clic del usuario)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                // 2. Ocultar botón de inicio y mostrar interfaz
                document.getElementById('btn-start-camera').style.display = 'none';
                document.getElementById('ui-main').style.display = 'block';
                
                await video.play();
            } catch (err) {
                alert("No se pudo acceder a la cámara. Revisa los permisos de tu navegador.");
                console.error(err);
            }
        }

        async function analizarIA(ocasion) {
            document.getElementById('modal-opt').style.display = 'none';
            document.getElementById('modal-loading').style.display = 'flex';

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            // 🚨 TU API KEY (Partida para evitar el bloqueo de GitHub)
            const p1 = "AIzaSy"; 
            const p2 = "C7qYCX6ZkWt27lBucufiBasxTLEhP16wQ"; 
            const API_KEY = p1 + p2;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: `Asesor de moda. Recomienda una prenda para ${ocasion}. Sé breve e incluye Página: [Número] y la palabra FOTO.` },
                        { inlineData: { mimeType: "image/jpeg", data: base64Img } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                let texto = data.candidates[0].content.parts[0].text;
                
                // Lógica de Foto
                const pMatch = texto.match(/Página:?\s*(\d+)/i);
                if (pMatch) {
                    const urlFoto = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/mujer/pagina_${pMatch[1]}.jpg`;
                    texto = texto.replace(/FOTO/g, `<br><a href="${urlFoto}" target="_blank" style="color:#00d1ff; font-weight:bold;">📸 VER FOTO</a>`);
                }

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = texto;

            } catch (err) {
                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>

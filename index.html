<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AURAM | IA-Blocks</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        #splash { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; letter-spacing: 12px; background: #000; z-index: 999; transition: 0.8s; pointer-events: none; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; inset: 0; z-index: 1; }
        .ui { position: absolute; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
        .btn-magic { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); font-size: 2.5rem; color: #fff; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; padding: 20px; text-align: center; }
        .btn-opt { margin: 10px; padding: 18px; width: 220px; border-radius: 15px; border: 1px solid #00d1ff; background: #111; color: #fff; font-size: 1.1rem; }
        .loader { border: 4px solid #222; border-top: 4px solid #00d1ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #res-body { text-align: left; max-width: 500px; line-height: 1.6; font-size: 1.1rem; overflow-y: auto; max-height: 60vh; }
        .btn-foto { background: #00d1ff; color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="splash">AURAM</div>
    <video id="webcam" autoplay playsinline muted></video>
    
    <div class="ui">
        <button class="btn-magic" onclick="mostrarOpciones()">✨</button>
    </div>

    <div id="modal-opt" class="overlay">
        <h2 style="font-weight:200;">¿Cuál es tu destino?</h2>
        <button class="btn-opt" onclick="analizarIA('Boda')">Boda Elegante</button>
        <button class="btn-opt" onclick="analizarIA('Cita')">Cita Romántica</button>
        <button class="btn-opt" onclick="analizarIA('Fiesta')">Fiesta Nocturna</button>
        <button class="btn-opt" onclick="analizarIA('Casual')">Uso Diario</button>
        <p onclick="cerrarModales()" style="margin-top:20px; color:#666;">Cancelar</p>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p>AURAM está analizando tu aura...</p>
    </div>

    <div id="modal-result" class="overlay" style="justify-content: flex-start; padding-top: 60px;">
        <div id="res-body"></div>
        <button onclick="location.reload()" style="margin-top:30px; background:#222; color:#fff; border:none; padding:12px 25px; border-radius:10px;">Nuevo Análisis</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // 🚨 CONFIGURACIÓN: PEGA TU LLAVE AQUÍ
        const API_KEY = "AIzaSyD0zxzRHftqgAsKcxSAxN1x5Lc7SgP_OsY"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });

        const video = document.getElementById('webcam');

        // Función para quitar el splash apenas la cámara esté lista
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    document.getElementById('splash').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
                };
            } catch (err) {
                alert("Error de cámara: " + err.message);
                document.getElementById('splash').innerText = "ERROR DE CÁMARA";
            }
        }

        window.mostrarOpciones = () => {
            document.getElementById('modal-opt').style.display = 'flex';
        };

        window.cerrarModales = () => {
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
        };

        window.analizarIA = async (ocasion) => {
            document.getElementById('modal-opt').style.display = 'none';
            document.getElementById('modal-loading').style.display = 'flex';

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const base64 = canvas.toDataURL('image/jpeg').split(',')[1];

                const result = await model.generateContent([
                    { inlineData: { data: base64, mimeType: "image/jpeg" } },
                    `Eres AURAM, asesor de moda empático. Analiza la imagen para una ${ocasion}. 
                    Sé breve. Incluye el número de página como "Página: [Número]" y la palabra "FOTO".`
                ]);

                let texto = result.response.text();
                const pMatch = texto.match(/Página:?\s*(\d+)/i);
                
                if (pMatch) {
                    const url = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/mujer/pagina_${pMatch[1]}.jpg`;
                    texto = texto.replace(/FOTO/g, `<br><a href="${url}" target="_blank" class="btn-foto">📸 VER EN CATÁLOGO</a>`);
                }

                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = texto;

            } catch (err) {
                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = "ERROR: " + err.message;
            }
        };

        // Iniciar todo
        startCamera();
    </script>
</body>
</html>

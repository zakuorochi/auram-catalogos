<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURAM App</title>
    <style>
        /* Ajustes para móviles: Evitar scroll y rebote */
        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100%; width: 100%; overflow: hidden;
            position: fixed;
        }
        
        /* SPLASH MOBILE */
        #splash { 
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background: #000; 
            z-index: 1000; transition: opacity 0.8s ease; text-align: center;
        }
        .logo-a-png { width: 120px; height: auto; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .brand-name { font-size: 1.4rem; letter-spacing: 12px; margin-top: 10px; font-weight: 200; }
        .aura-msg { margin-top: 30px; font-size: 0.7rem; letter-spacing: 2px; color: #00d1ff; text-transform: uppercase; padding: 0 20px; }

        /* CÁMARA FULLSCREEN MÓVIL */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scaleX(-1); /* Efecto espejo para selfie */
            position: absolute; inset: 0; z-index: 1; 
        }

        /* UI INFERIOR (Reachability) */
        .ui { 
            position: absolute; bottom: 40px; width: 100%; 
            display: flex; justify-content: center; z-index: 100; 
        }
        .btn-magic { 
            width: 75px; height: 75px; border-radius: 50%; 
            border: none; background: linear-gradient(135deg, #00d1ff, #0072ff); 
            font-size: 2rem; color: #fff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }

        /* MODALES ADAPTADOS A MÓVIL */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; flex-direction: column; align-items: center; 
            z-index: 200; padding: 20px; padding-top: 60px;
        }
        .grid-opts { 
            display: grid; grid-template-columns: 1fr; gap: 15px; 
            width: 90%; max-width: 300px; margin-top: 20px; 
        }
        .btn-opt { 
            padding: 20px; border-radius: 18px; border: 1px solid #222; 
            background: #111; color: #fff; font-size: 1rem; font-weight: 500;
        }

        /* RESULTADO MÓVIL */
        #res-body { 
            width: 90%; font-size: 1rem; line-height: 1.6; 
            color: #ddd; overflow-y: auto; padding-bottom: 20px;
        }

        /* MINIATURA MÓVIL */
        .thumb-container { 
            margin-top: 20px; background: #111; 
            border-radius: 20px; padding: 15px; border: 1px solid #00d1ff;
        }
        .thumb-img { width: 100%; max-width: 250px; border-radius: 12px; }
        
        .btn-reload {
            margin-top: 20px; background: #fff; color: #000; 
            padding: 15px 40px; border-radius: 30px; font-weight: bold; border: none;
        }
    </style>
</head>
<body onclick="iniciarApp()">

    <div id="splash">
        <img src="logo-auram.png" class="logo-a-png">
        <div class="brand-name">AURAM</div>
        <div class="aura-msg">El primer asistente de estilo IA<br>Toca para comenzar</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    
    <div class="ui">
        <button class="btn-magic" onclick="event.stopPropagation(); abrirMenu()">✨</button>
    </div>

    <div id="modal-opt" class="overlay">
        <h3 style="font-weight:200; letter-spacing: 2px;">¿A DÓNDE VAS HOY?</h3>
        <div class="grid-opts">
            <button class="btn-opt" onclick="ejecutarIA('Boda')">Boda o Gala</button>
            <button class="btn-opt" onclick="ejecutarIA('Cita')">Una Cita</button>
            <button class="btn-opt" onclick="ejecutarIA('Trabajo')">Trabajo</button>
            <button class="btn-opt" onclick="ejecutarIA('Casual')">Día Casual</button>
        </div>
        <p onclick="cerrarModales()" style="margin-top:30px; color:#666;">Cerrar</p>
    </div>

    <div id="modal-loading" class="overlay">
        <div class="loader"></div>
        <p>AURAM está analizando tu aura...</p>
    </div>

    <div id="modal-result" class="overlay">
        <div id="res-body"></div>
        <button class="btn-reload" onclick="location.reload()">REINTENTAR</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        let appIniciada = false;

        function iniciarApp() {
            if(appIniciada) return;
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            
            // Configuración de cámara para móvil (Frontal)
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            }).then(stream => {
                video.srcObject = stream;
                appIniciada = true;
                setTimeout(() => splash.style.display = 'none', 800);
            }).catch(err => alert("Activa la cámara para usar AURAM"));
        }

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const limpio = texto.replace(/Género:?\s*(hombre|mujer)/gi, "").replace(/Página:?\s*\d+/gi, "").replace(/FOTO/gi, "").replace(/<[^>]*>/g, "");
            const m = new SpeechSynthesisUtterance(limpio);
            m.lang = 'es-ES';
            window.speechSynthesis.speak(m);
        }

        function abrirMenu() { document.getElementById('modal-opt').style.display = 'flex'; }
        function cerrarModales() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

        async function ejecutarIA(ocasion) {
            cerrarModales();
            document.getElementById('modal-loading').style.display = 'flex';
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Img = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            try {
                const response = await fetch('/api/analizar', {
                    method: 'POST',
                    body: JSON.stringify({ image: base64Img, ocasion: ocasion })
                });
                const data = await response.json();
                let textoIA = data.candidates[0].content.parts[0].text;
                
                hablar(textoIA);

                const pagMatch = textoIA.match(/Página:?\s*(\d+)/i);
                const genMatch = textoIA.match(/Género:?\s*(hombre|mujer)/i);

                if (pagMatch && genMatch) {
                    const urlFoto = `https://raw.githubusercontent.com/zakuorochi/auram-catalogos/main/catalogos/${genMatch[1].toLowerCase()}/(${pagMatch[1]}).jpg`;
                    const htmlFoto = `<div class="thumb-container">
                        <img src="${urlFoto}" class="thumb-img">
                        <p style="font-size:0.7rem; color:#00d1ff; margin-top:10px;">RECOMENDACIÓN AURAM</p>
                    </div>`;
                    textoIA = textoIA.replace(/FOTO/g, htmlFoto);
                }

                textoIA = textoIA.replace(/Género:?\s*(hombre|mujer)/gi, "").replace(/Página:?\s*\d+/gi, "");
                document.getElementById('modal-loading').style.display = 'none';
                document.getElementById('modal-result').style.display = 'flex';
                document.getElementById('res-body').innerHTML = textoIA;

            } catch (err) {
                alert("Error al conectar con la IA");
                cerrarModales();
            }
        }
    </script>
</body>
</html>
